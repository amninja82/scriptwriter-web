<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 设置 - 多智能体编剧系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }

        .status-card.has-token {
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }

        .status-card.no-token {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .status-desc {
            font-size: 12px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group .help {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .form-group .help a {
            color: #667eea;
            text-decoration: none;
        }

        .form-group .help a:hover {
            text-decoration: underline;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: #fff;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            border-color: #ccc;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 16px;
            margin-top: 24px;
            border-radius: 4px;
        }

        .info-box h4 {
            font-size: 14px;
            color: #1565c0;
            margin-bottom: 8px;
        }

        .info-box p {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            background: #28a745;
            color: #fff;
        }

        .toast.error {
            background: #dc3545;
            color: #fff;
        }

        .toast.loading {
            background: #667eea;
            color: #fff;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 API Token 设置</h1>
            <p>配置您的 Coze API Token</p>
        </div>

        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">❓</div>
            <div class="status-text" id="statusText">检查中...</div>
            <div class="status-desc" id="statusDesc">正在检查 Token 状态</div>
        </div>

        <div class="form-group">
            <label for="tokenInput">API Token</label>
            <input
                type="text"
                id="tokenInput"
                placeholder="pat_xxxx..."
                oninput="validateToken()"
            />
            <div class="help">
                在 Coze 平台获取您的 Token：<br>
                <a href="https://coze.com/user/pat" target="_blank">https://coze.com/user/pat</a>
            </div>
        </div>

        <div class="actions">
            <button id="saveButton" class="btn btn-primary" onclick="saveToken()" disabled>
                保存 Token
            </button>
            <button class="btn btn-secondary" onclick="goBack()">
                返回主页
            </button>
        </div>

        <div class="info-box">
            <h4>💡 关于 Token</h4>
            <p>
                • Token 用于验证您的身份，访问编剧智能体服务<br>
                • Token 保存在云端，下次打开无需重新输入<br>
                • 请妥善保管您的 Token，不要泄露给他人
            </p>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = window.location.origin;
        const DEVICE_ID = localStorage.getItem('device_id') || 'device_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', DEVICE_ID);

        let hasToken = false;

        // 初始化
        window.onload = function() {
            checkTokenStatus();
        };

        // 检查 Token 状态
        async function checkTokenStatus() {
            updateStatus('loading', '检查中...', '正在检查 Token 状态');

            // 先从 localStorage 读取
            let localToken = localStorage.getItem('coze_token') || '';

            if (localToken) {
                hasToken = true;
                updateStatus('has', '✅ 已设置', '您的 Token 已配置');
                document.getElementById('tokenInput').value = localToken;
                return;
            }

            // 如果本地没有，检查后端
            try {
                const response = await fetch(`${API_BASE}/api/token?device_id=${DEVICE_ID}`);
                const data = await response.json();

                hasToken = data.has_token;

                if (hasToken && data.token) {
                    updateStatus('has', '✅ 已设置', '您的 Token 已配置');
                    document.getElementById('tokenInput').value = data.token;
                    // 同步到 localStorage
                    localStorage.setItem('coze_token', data.token);
                } else {
                    updateStatus('no', '❌ 未设置', '请配置您的 API Token');
                }
            } catch (error) {
                updateStatus('error', '⚠️ 错误', '检查 Token 状态失败');
                console.error('检查 Token 失败:', error);
            }
        }

        // 更新状态显示
        function updateStatus(type, text, desc) {
            const card = document.getElementById('statusCard');
            const icon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            const statusDesc = document.getElementById('statusDesc');

            card.className = 'status-card';
            icon.textContent = '❓';
            statusText.textContent = text;
            statusDesc.textContent = desc;

            if (type === 'has') {
                card.classList.add('has-token');
                icon.textContent = '✅';
            } else if (type === 'no') {
                card.classList.add('no-token');
                icon.textContent = '❌';
            } else if (type === 'error') {
                card.classList.add('no-token');
                icon.textContent = '⚠️';
            }
        }

        // 验证 Token 格式
        function validateToken() {
            const token = document.getElementById('tokenInput').value.trim();
            const saveButton = document.getElementById('saveButton');

            // Token 应该以 pat_ 开头，长度至少 10
            const isValid = token.startsWith('pat_') && token.length >= 10;
            saveButton.disabled = !isValid;
        }

        // 保存 Token
        async function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();

            if (!token.startsWith('pat_') || token.length < 10) {
                showToast('Token 格式无效', 'error');
                return;
            }

            const saveButton = document.getElementById('saveButton');
            saveButton.disabled = true;
            saveButton.innerHTML = '<span class="loading-spinner"></span>保存中...';

            try {
                const response = await fetch(`${API_BASE}/api/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        device_id: DEVICE_ID,
                        token: token
                    })
                });

                const data = await response.json();

                if (data.success) {
                    hasToken = true;
                    // 保存到 localStorage
                    localStorage.setItem('coze_token', token);
                    updateStatus('has', '✅ 已设置', '您的 Token 已配置');
                    showToast('Token 保存成功！', 'success');
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (error) {
                showToast('保存失败：' + error.message, 'error');
                console.error('保存 Token 失败:', error);
            } finally {
                saveButton.disabled = false;
                saveButton.innerHTML = '保存 Token';
            }
        }

        // 返回主页
        function goBack() {
            window.location.href = '/';
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            if (type === 'loading') {
                toast.innerHTML = '<span class="loading-spinner"></span>' + message;
            } else {
                toast.textContent = message;
            }

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
